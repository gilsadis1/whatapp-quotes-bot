name: Daily Inspiration Quote

env:
  OPENAI_MODEL: gpt-4o-mini
  SMTP_HOST: smtp.gmail.com
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
  EMAIL_FROM_NAME: Daily Quote Bot
  MIN_DAYS_BETWEEN_REPEATS: "90"
  INCLUDE_REFLECTION_QUESTION: "false"
  DRY_RUN: "false"
  CONTENT_LANGUAGE: "he"
  WIKIPEDIA_LANG: "he"
  READ_MORE_TEXT: ""
  QUESTION_PREFIX: ""

on:
  schedule:
    # 14:00 Asia/Jerusalem is usually 12:00 UTC (standard time) and 11:00 UTC (DST).
    # This cron uses 12:00 UTC and may be off by 1 hour during DST changes.
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Restore sent history
        id: sent-history-restore
        uses: actions/cache/restore@v4
        with:
          path: data/sent.json
          key: sent-history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            sent-history-${{ github.ref_name }}-

      - name: Ensure sent history file exists
        run: |
          mkdir -p data
          test -f data/sent.json || echo "[]" > data/sent.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check config
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_SUBJECT: ${{ secrets.EMAIL_SUBJECT }}
        run: npm run check-config

      - name: Start
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_SUBJECT: ${{ secrets.EMAIL_SUBJECT }}
        run: npm start

      - name: Save sent history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/sent.json
          key: sent-history-${{ github.ref_name }}-${{ github.run_id }}
